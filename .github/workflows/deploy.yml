name: Build, Push & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push dashboard
        run: |
          docker build -t ghcr.io/kakoritz/project-kakoritz:latest .
          docker push ghcr.io/kakoritz/project-kakoritz:latest

  build-photo-api:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and deploy photo-api
        run: |
          DOCKER=/var/packages/ContainerManager/target/usr/bin/docker
          sudo docker build -t photo-api:latest ./photo-api
          sudo docker save photo-api:latest | ssh aspiker@192.168.1.251 "cat > /volume2/docker/photo-api.tar"
          ssh aspiker@192.168.1.251 "$DOCKER load < /volume2/docker/photo-api.tar"
          ssh aspiker@192.168.1.251 "mkdir -p /volume2/docker/kakoritz-data"
          ssh aspiker@192.168.1.251 "$DOCKER stop photo-api || true"
          ssh aspiker@192.168.1.251 "$DOCKER rm photo-api || true"
          ssh aspiker@192.168.1.251 "$DOCKER run -d --name photo-api --restart unless-stopped -p 8586:3001 -v '/volume1/Data/Pictures/FAMILY:/photos:ro' -v '/volume2/docker/kakoritz-data:/data' -e TASKS_FILE=/data/tasks.json photo-api:latest"

  build-claude-api:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and deploy claude-api
        run: |
          DOCKER=/var/packages/ContainerManager/target/usr/bin/docker
          sudo docker build -t claude-api:latest ./claude-api
          sudo docker save claude-api:latest | ssh aspiker@192.168.1.251 "cat > /volume2/docker/claude-api.tar"
          ssh aspiker@192.168.1.251 "$DOCKER load < /volume2/docker/claude-api.tar"
          ssh aspiker@192.168.1.251 "$DOCKER stop claude-api || true"
          ssh aspiker@192.168.1.251 "$DOCKER rm claude-api || true"
          ssh aspiker@192.168.1.251 "$DOCKER run -d --name claude-api --restart unless-stopped -p 8587:3001 -e ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} claude-api:latest"

  deploy-dashboard:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Deploy dashboard
        run: |
          DOCKER=/var/packages/ContainerManager/target/usr/bin/docker
          ssh aspiker@192.168.1.251 "$DOCKER pull ghcr.io/kakoritz/project-kakoritz:latest"
          ssh aspiker@192.168.1.251 "$DOCKER stop project-kakoritz || true"
          ssh aspiker@192.168.1.251 "$DOCKER rm project-kakoritz || true"
          ssh aspiker@192.168.1.251 "$DOCKER run -d --name project-kakoritz --restart unless-stopped -p 8585:80 ghcr.io/kakoritz/project-kakoritz:latest"
