name: Build, Push & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push dashboard
        run: |
          docker build -t ghcr.io/kakoritz/project-kakoritz:latest .
          docker push ghcr.io/kakoritz/project-kakoritz:latest

      - name: Build and push photo-api
        run: |
          docker build -t ghcr.io/kakoritz/photo-api:latest ./photo-api
          docker push ghcr.io/kakoritz/photo-api:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Deploy dashboard
        run: |
          DOCKER=/var/packages/ContainerManager/target/usr/bin/docker
          ssh aspiker@192.168.1.251 "$DOCKER pull ghcr.io/kakoritz/project-kakoritz:latest"
          ssh aspiker@192.168.1.251 "$DOCKER stop project-kakoritz || true"
          ssh aspiker@192.168.1.251 "$DOCKER rm project-kakoritz || true"
          ssh aspiker@192.168.1.251 "$DOCKER run -d --name project-kakoritz --restart unless-stopped -p 8585:80 ghcr.io/kakoritz/project-kakoritz:latest"

      - name: Deploy photo-api
        run: |
          DOCKER=/var/packages/ContainerManager/target/usr/bin/docker
          ssh aspiker@192.168.1.251 "$DOCKER pull ghcr.io/kakoritz/photo-api:latest"
          ssh aspiker@192.168.1.251 "$DOCKER stop photo-api || true"
          ssh aspiker@192.168.1.251 "$DOCKER rm photo-api || true"
          ssh aspiker@192.168.1.251 "$DOCKER run -d --name photo-api --restart unless-stopped -p 8586:3001 -v /volume1/Data/Pictures/FAMILY:/photos:ro ghcr.io/kakoritz/photo-api:latest"
